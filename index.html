<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>門市服務工具箱</title>
<style>
:root{
  --bg:#f0f4f8; --white:#fff; --text:#1e293b; --gray:#64748b;
  --border:#dde3ed; --light:#f1f5f9; --blue:#0ea5e9; --blue-bg:#e0f2fe;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
.hdr{background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 24px}
.hdr-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-size:13px;color:var(--gray);margin-top:2px}
.main{max-width:900px;margin:0 auto;padding:32px 24px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:8px;transition:all .15s}
.card:hover{border-color:var(--blue);box-shadow:0 6px 20px rgba(14,165,233,.15);transform:translateY(-2px)}
.card .icon{font-size:28px}
.card .name{font-size:16px;font-weight:700}
.card .desc{font-size:13px;color:var(--gray);line-height:1.6}
.empty-hint{margin-top:20px;font-size:13px;color:var(--gray)}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">門市服務工具箱</div>
  <div class="hdr-sub">各門市共用的小工具入口</div>
</div>
<div class="main">
  <div class="grid">
    <a class="card" href="ig-story/">
      <div class="icon">🎬</div>
      <div class="name">IG 限時動態製作工具</div>
      <div class="desc">多種版面排版、繁中字體、素材位置微調，快速做出限動用的圖片或影片。</div>
    </a>
    <a class="card" href="slow-motion/">
      <div class="icon">🐢</div>
      <div class="name">影片慢動作製作工具</div>
      <div class="desc">上傳影片，選擇慢動作倍率，產生無聲慢動作影片並下載。</div>
    </a>
    <a class="card" href="greeting-card/">
      <div class="icon">💌</div>
      <div class="name">賀卡製作工具</div>
      <div class="desc">製作節慶／活動賀卡（原部署於 Cloudflare Workers）。</div>
    </a>
    <a class="card" href="meme-generator/">
      <div class="icon">😂</div>
      <div class="name">迷因製作工具</div>
      <div class="desc">快速製作迷因圖（原部署於 Cloudflare Workers）。</div>
    </a>
    <a class="card" href="https://magicbrian1206-maker.github.io/schedule-to-ics/" target="_blank" rel="noopener">
      <div class="icon">📅</div>
      <div class="name">排班工具</div>
      <div class="desc">將班表轉換成 ICS 格式，匯入手機行事曆。</div>
    </a>
    <a class="card" href="https://price-tag-crop.vercel.app" target="_blank" rel="noopener">
      <div class="icon">✂️</div>
      <div class="name">價格牌裁切工具</div>
      <div class="desc">價格標籤圖片裁切工具。</div>
    </a>
  </div>
  <div class="empty-hint">未來會陸續加入更多門市常用工具。</div>
</div>
</body>
</html>
